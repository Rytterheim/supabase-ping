on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Pinga Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://mmgdsnuhravklunmcidw.supabase.co/auth/v1/health" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          
          echo "HTTP-svar: $response"
          
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Supabase svarar och är aktiv!"
          else
            echo "⚠️ Oväntat svar: $response"
            exit 1
          fi
